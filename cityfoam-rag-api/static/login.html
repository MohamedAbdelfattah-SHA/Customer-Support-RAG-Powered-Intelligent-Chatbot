<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityFoam Admin Login</title>
  <style>
    /* نفس التنسيق السابق */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f4f6f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      width: 360px;
      max-width: 90%;
      text-align: center;
    }
    h2 { margin-bottom: 24px; color: #0f172a; font-weight: 600; }
    label { display: block; text-align: left; margin-bottom: 6px; font-weight: 500; color: #334155; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    button {
      width: 100%;
      padding: 12px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #4338ca; }
    .error-message { color: #dc2626; font-size: 0.9rem; margin-top: 12px; display: none; }
    .back-link { display: inline-block; margin-top: 18px; color: #6366f1; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>🔐 Admin Login</h2>
    <form id="loginForm">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" required autocomplete="off">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" required>
      <button type="submit">Login</button>
      <p id="errorMsg" class="error-message">Invalid username or password</p>
    </form>
    <a href="/" class="back-link">← Back to Chat</a>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      const formData = new FormData();
      formData.append('username', username);
      formData.append('password', password);

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        if (response.ok && data.status === 'success') {
          // حفظ الرمز في sessionStorage
          sessionStorage.setItem('admin_token', data.token);
          // توجيه إلى صفحة الأدمن
          window.location.href = '/static/admin.html';
        } else {
          errorMsg.style.display = 'block';
          document.getElementById('password').value = '';
        }
      } catch (error) {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
